name: Informar un dato desactualizado
description: Avisar sobre un teléfono, horario, enlace u otro dato que haya cambiado.
title: "Dato desactualizado: "
labels:
  - datos
body:
  - type: markdown
    attributes:
      value: |
        Gracias por ayudar a mantener Mapa Comunitario. No incluyas nombres, historias clínicas ni información de una situación personal.
  - type: input
    id: resource
    attributes:
      label: Recurso
      description: Nombre de la ficha que necesita una corrección.
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Dato que cambió
      description: Indicá qué muestra la aplicación y cuál sería el dato actual.
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Fuente actual
      description: Enlace oficial que permita comprobar el cambio, si está disponible.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacidad
      options:
        - label: Confirmo que este reporte no contiene datos personales ni información clínica.
          required: true
